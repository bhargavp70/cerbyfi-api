<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CerbyFi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-brand">
      <img src="logo.png" alt="CerbyFi logo" class="header-logo" />
      <div>
        <h1>Cerby<span>Fi</span></h1>
        <p>Stock &amp; fund scoring — 100-point framework &nbsp;·&nbsp; <span id="analysis-counter" class="counter-text"></span></p>
      </div>
    </div>
    <div class="header-auth" id="header-auth">
      <button class="auth-link" id="btn-open-login">Sign in</button>
      <button class="auth-link primary" id="btn-open-register">Register</button>
    </div>
  </div>
</header>

<!-- Auth modal -->
<div id="auth-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-login">Sign in</button>
      <button class="modal-tab" id="tab-register">Register</button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="auth-form">
      <label>Email
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </label>
      <label>Password
        <input type="password" id="login-password" placeholder="Password" required />
      </label>
      <div id="login-error" class="form-error"></div>
      <button type="submit" class="auth-submit" id="login-submit">Sign in</button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="auth-form" style="display:none;">
      <label>Name
        <input type="text" id="reg-name" placeholder="Your name" required />
      </label>
      <label>Email
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </label>
      <label>Password
        <input type="password" id="reg-password" placeholder="At least 6 characters" required />
      </label>
      <div id="reg-error" class="form-error"></div>
      <button type="submit" class="auth-submit" id="reg-submit">Create account</button>
    </form>
  </div>
</div>

<main>
  <div class="layout">

    <!-- Left sidebar: Watchlist + Most Searched -->
    <aside class="layout-sidebar">

      <!-- Watchlist -->
      <div id="watchlist-section" style="display:none;">
        <div class="watchlist-header">
          <span class="watchlist-title">Watchlist</span>
          <button id="clear-watchlist-btn" class="wl-clear-btn">Clear all</button>
        </div>
        <div id="watchlist-grid"></div>
      </div>

      <!-- Most Searched -->
      <div id="top-section" style="display:none;">
        <div class="watchlist-header">
          <span class="watchlist-title">Most Searched</span>
        </div>
        <div class="top-columns">
          <div>
            <div class="top-col-label">Stocks</div>
            <ol id="top-stocks-list" class="top-list"></ol>
          </div>
          <div>
            <div class="top-col-label">ETFs / Funds</div>
            <ol id="top-funds-list" class="top-list"></ol>
          </div>
        </div>
      </div>

    </aside>

    <!-- Right main: Search + Error + Results -->
    <div class="layout-main">

      <!-- Search card -->
      <div class="search-card">
        <form id="search-form">
          <div class="input-row">
            <input
              id="ticker-input"
              type="text"
              placeholder="e.g. AAPL, NVDA, TSLA, SPY, QQQ"
              autocomplete="off"
              autocapitalize="characters"
              spellcheck="false"
            />
            <button id="analyze-btn" type="submit">Analyze</button>
          </div>
        </form>
      </div>

      <!-- Error -->
      <div id="error-section">
        <strong>Error</strong> — <span id="error-msg"></span>
      </div>

      <!-- Results -->
      <div id="results-section">

        <div class="result-header">
          <div class="result-meta">
            <div>
              <span class="result-name" id="result-name"></span>
              <span class="result-ticker" id="result-ticker"></span>
              <span class="result-ticker" id="result-type-badge"></span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <span class="cached-badge" id="cached-badge" style="display:none"></span>
              <button id="watchlist-btn" class="wl-toggle-btn"></button>
            </div>
          </div>

          <div class="score-row">
            <div>
              <span class="score-big" id="score-big"></span>
              <span class="score-denom" id="score-denom"></span>
            </div>
            <div>
              <div class="stars" id="stars-row"></div>
              <div class="rating-text" id="rating-text"></div>
            </div>
          </div>

          <div class="total-bar-wrap">
            <div class="bar-track">
              <div id="total-bar-fill" class="bar-fill" style="width:0%"></div>
            </div>
          </div>
        </div>

        <div class="categories-grid" id="categories-grid"></div>

      </div><!-- /results -->

    </div><!-- /layout-main -->

  </div><!-- /layout -->
</main>

<footer>
  Data: Finnhub &nbsp;·&nbsp; Financial Modeling Prep &nbsp;·&nbsp; For informational purposes only
</footer>

<script src="/config.js"></script>
<script src="app.js"></script>
</body>
</html>
